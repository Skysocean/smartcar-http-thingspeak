<script>

// ------------------ ThingSpeak ------------------
const channelID = "3293937";
const readAPIKey = "9KP4ZPXF8XZJDLVK";
const writeAPIKey = "HCYB1DOCOVHSBBVJ";

// ------------------ SEND COMMANDS ------------------
function send(cmd) {
  let url = `https://api.thingspeak.com/update?api_key=${writeAPIKey}&field1=${cmd}`;
  fetch(url)
    .then(res => console.log("Command sent:", cmd));
}

function buzzer(cmd) {
  let url = `https://api.thingspeak.com/update?api_key=${writeAPIKey}&field4=${cmd}`;
  fetch(url);
}

function sendMessage() {
  let text = document.getElementById("msg").value;

  if(text.length > 64) {
    alert("Max 64 characters!");
    return;
  }

  let url = `https://api.thingspeak.com/update?api_key=${writeAPIKey}&field5=${encodeURIComponent(text)}`;
  fetch(url);
}

// ------------------ READ DATA ------------------
function readData() {
  let url = `https://api.thingspeak.com/channels/${channelID}/feeds/last.json?api_key=${readAPIKey}`;

  fetch(url)
    .then(response => response.json())
    .then(data => {

      document.getElementById("distance").innerText = data.field3 || "--";
      document.getElementById("ir").innerText = data.field6 || "--";
      document.getElementById("state").innerText = data.field7 || "--";

    })
    .catch(err => console.log("Error:", err));
}

// ------------------ POLLING ------------------
setInterval(readData, 15000); // every 15 seconds

</script>
